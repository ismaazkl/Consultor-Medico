services:
  - type: web
    name: consultorio-medico
    runtime: php
    region: oregon
    plan: free
    buildCommand: composer install --optimize-autoloader --no-dev && npm install && npm run build
    startCommand: php artisan serve --host=0.0.0.0 --port=$PORT
    envVars:
      - key: APP_KEY
        generateValue: true
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_URL
        value: https://consultorio-medico.onrender.com
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: consultorio-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: consultorio-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: consultorio-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: consultorio-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: consultorio-db
          property: password
      - key: SESSION_DRIVER
        value: database
      - key: QUEUE_CONNECTION
        value: sync
      - key: CACHE_STORE
        value: database

databases:
  - name: consultorio-db
    plan: free
    region: oregon
    databaseName: consultorio_medico
    postgresMajorVersion: 16
